<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선박 위치 및 동의 현황 관리</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=version) }}" />
</head>
<body>
  <div class="container">
    <aside class="sidebar" id="sidebar">
      <h1>선박 위치 및 동의 현황</h1>

      <p>
        선박을 클릭하면 해당 선박 안내창만 표시됩니다.
        전체보기에서는 현재 화면에 보이는 선박만 안내창이 표시됩니다.
      </p>

      <div class="card">
        <h2>선박 정보 입력</h2>
        <form id="vesselForm">
          <label for="vesselName">선박명</label>
          <input type="text" id="vesselName" placeholder="예: RIO DE JANEIRO ENERGY" required />

          <label for="fujairahConsent">푸자이라항 동의 여부</label>
          <select id="fujairahConsent">
            <option value="동의">동의</option>
            <option value="미동의">미동의</option>
            <option value="확인중">확인중</option>
          </select>

          <label for="yanbuConsent">얀부항 동의 여부</label>
          <select id="yanbuConsent">
            <option value="동의">동의</option>
            <option value="미동의">미동의</option>
            <option value="확인중">확인중</option>
          </select>

          <label for="consentLetter">동의서 확보 상태</label>
          <select id="consentLetter">
            <option value="확보">확보</option>
            <option value="미확보">미확보</option>
            <option value="진행중">진행중</option>
          </select>

          <label for="voyagePlan">항차계획</label>
          <input type="text" id="voyagePlan" placeholder="예: Yanbu 예정, Fujairah 검토중" />

          <label for="crewPlanStatus">선원교대 계획</label>
          <select id="crewPlanStatus">
            <option value="불요">불요</option>
            <option value="확정">확정</option>
            <option value="미정">미정</option>
          </select>

          <label for="crewCount">선원교대 인원</label>
          <input type="number" id="crewCount" min="0" placeholder="예: 5" />

          <label for="crewDate">선원교대 날짜</label>
          <input type="text" id="crewDate" placeholder="예: 3/15, 2026-03-15, 미정" />

          <label for="crewPort">선원교대 항구</label>
          <input type="text" id="crewPort" placeholder="예: 싱가폴, 두바이, 수에즈" />

          <label for="crewPlanDetail">선원교대 상세</label>
          <input type="text" id="crewPlanDetail" placeholder="예: 3월 15일 교대 예정, 검토중" />

          <label for="bonusCount">보너스 횟수</label>
          <input type="number" id="bonusCount" min="0" placeholder="예: 2" />

          <label for="bonusAmount">보너스 총액 ($)</label>
          <input type="number" id="bonusAmount" min="0" step="any" placeholder="예: 15000" />

          <label for="latitude">위도</label>
          <input type="number" id="latitude" step="any" placeholder="예: 25.1122" required />

          <label for="longitude">경도</label>
          <input type="number" id="longitude" step="any" placeholder="예: 56.3361" required />

          <button type="submit">선박 추가 / 저장</button>
          <button type="button" class="btn-secondary" id="resetBtn">입력 초기화</button>
        </form>
      </div>

      <div class="card">
        <h2>등록된 선박</h2>
        <div id="vesselList" class="vessel-list"></div>
      </div>
    </aside>

    <main class="map-wrap" id="mapWrap">
      <div class="map-toolbar">
        <div class="search-box">
          <input type="text" id="shipSearchInput" placeholder="선박검색" autocomplete="off" />
          <div id="shipSearchDropdown" class="search-dropdown"></div>
        </div>

        <button type="button" id="toggleAllLabelsBtn" class="toolbar-chip toolbar-chip-btn active">
          <span class="toolbar-chip-label">전체보기</span>
          <span class="toolbar-chip-value">ON/OFF</span>
        </button>

        <button type="button" id="filterAllBtn" class="toolbar-chip toolbar-chip-btn active">
          <span class="toolbar-chip-label">전체선박</span>
          <span class="toolbar-chip-value" id="countAll">0척</span>
        </button>

        <button type="button" id="filterCrewConfirmedBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">선원교대확정</span>
          <span class="toolbar-chip-value" id="countCrewConfirmed">0척</span>
        </button>

        <button type="button" id="filterCrewPendingBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">선원교대미정</span>
          <span class="toolbar-chip-value" id="countCrewPending">0척</span>
        </button>

        <button type="button" id="filterNoConsentBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">동의서 미확보</span>
          <span class="toolbar-chip-value" id="countNoConsent">0척</span>
        </button>

        <button type="button" id="filterFujairahBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">푸자이라 가능</span>
          <span class="toolbar-chip-value" id="countFujairah">0척</span>
        </button>

        <button type="button" id="filterYanbuBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">얀부 가능</span>
          <span class="toolbar-chip-value" id="countYanbu">0척</span>
        </button>

        <button type="button" id="filterBothBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">모두가능</span>
          <span class="toolbar-chip-value" id="countBoth">0척</span>
        </button>
      </div>

      <div id="map"></div>
      <div id="labelLayer" class="label-layer"></div>
    </main>
  </div>

  <input type="file" id="consentFileInput" accept=".pdf,.jpg,.jpeg,.png,.webp" hidden />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='js/app.js', v=version) }}"></script>
</body>
</html>
