<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선박 위치 및 동의 현황 관리</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=version) }}" />
</head>
<body>
  <div class="container">
    <aside class="sidebar" id="sidebar">
      <h1>선박 위치 및 동의 현황</h1>

      <p>
        선박을 클릭하면 해당 선박 안내창만 표시됩니다.
        전체보기에서는 현재 화면에 보이는 선박만 안내창이 표시됩니다.
      </p>

      <div class="card">
        <div class="report-topbar">
          <h2>선박 정보 입력</h2>
          <div class="report-topbar-actions">
            <button type="button" id="reportViewBtn" class="report-view-btn">Report 보기</button>
          </div>
        </div>

        <form id="vesselForm">
          <div class="form-row">
            <label for="vesselName">선박명</label>
            <input type="text" id="vesselName"
                  placeholder="예: RIO DE JANEIRO ENERGY"
                  required
                  readonly />
          </div>

          <div class="form-row">
            <label for="managementCompany">관리사</label>
            <input type="text" id="managementCompany" placeholder="예: CMT2, OSM, Anglo Eastern" />
          </div>

          <div class="form-row">
            <label for="builder">Builder</label>
            <input type="text" id="builder" placeholder="예: HHI" />
          </div>

          <div class="form-row">
            <label for="deliveryDate">Delivery Date</label>
            <input type="date" id="deliveryDate" />
          </div>

          <div class="form-row">
            <label for="nextDryDock">Next Dry dock</label>
            <input type="date" id="nextDryDock" />
          </div>

          <div class="form-row" id="row-category">
            <label for="category">분류</label>
            <select id="category">
              <option value="AG 내">AG 내</option>
              <option value="얀부, 푸자이라">얀부, 푸자이라</option>
              <option value="그외 지역">그외 지역</option>
            </select>
          </div>

          <div class="form-row" id="row-fujairahConsent">
            <label for="fujairahConsent">푸자이라항 동의 여부</label>
            <select id="fujairahConsent">
              <option value="동의">동의</option>
              <option value="미동의">미동의</option>
              <option value="확인중">확인중</option>
              <option value="불요">불요</option>
            </select>
          </div>

          <div class="form-row" id="row-yanbuConsent">
            <label for="yanbuConsent">얀부항 동의 여부</label>
            <select id="yanbuConsent">
              <option value="동의">동의</option>
              <option value="미동의">미동의</option>
              <option value="확인중">확인중</option>
              <option value="불요">불요</option>
            </select>
          </div>

          <div class="form-row" id="row-consentLetter">
            <label for="consentLetter">동의서 확보</label>
            <select id="consentLetter">
              <option value="확보">확보</option>
              <option value="미확보">미확보</option>
              <option value="진행중">진행중</option>
              <option value="불요">불요</option>
            </select>
          </div>

          <div class="form-row" id="row-voyagePlan">
            <label for="voyagePlan">항차계획</label>
            <input type="text" id="voyagePlan" placeholder="예: Yanbu 예정, Fujairah 검토중" />
          </div>

          <div class="form-row" id="row-agSupplyPlan">
            <label for="agSupplyPlan">윤활유 보급계획 등</label>
            <input type="text" id="agSupplyPlan" placeholder="예: AG 내 보급 예정, Exxon 확인중" />
          </div>

          <div class="form-row" id="row-crewPlanStatus">
            <label for="crewPlanStatus">선원교대 계획</label>
            <select id="crewPlanStatus">
              <option value="불요">불요</option>
              <option value="확정">확정</option>
              <option value="미정">미정</option>
            </select>
          </div>

          <div class="form-row" id="row-crewCount">
            <label for="crewCount">선원교대 인원</label>
            <input type="number" id="crewCount" min="0" placeholder="예: 5" />
          </div>

          <div class="form-row" id="row-crewDate">
            <label for="crewDate">선원교대 날짜</label>
            <input type="text" id="crewDate" placeholder="예: 3/15, 2026-03-15, 미정" />
          </div>

          <div class="form-row" id="row-crewPort">
            <label for="crewPort">선원교대 항구</label>
            <input type="text" id="crewPort" placeholder="예: 싱가폴, 두바이, 수에즈" />
          </div>

          <div class="form-row" id="row-crewPlanDetail">
            <label for="crewPlanDetail">선원교대 상세</label>
            <input type="text" id="crewPlanDetail" placeholder="예: 3월 15일 교대 예정, 검토중" />
          </div>

          <div class="form-row" id="row-bonusCount">
            <label for="bonusCount">보너스 횟수</label>
            <input type="number" id="bonusCount" min="0" placeholder="예: 2" />
          </div>

          <div class="form-row" id="row-bonusAmount">
            <label for="bonusAmount">보너스 총액 ($)</label>
            <input type="number" id="bonusAmount" min="0" step="any" placeholder="예: 15000" />
          </div>

          <div class="form-row">
            <label for="latitude">위도</label>
            <input type="number" id="latitude" step="any" placeholder="예: 25.1122" required />
          </div>

          <div class="form-row">
            <label for="longitude">경도</label>
            <input type="number" id="longitude" step="any" placeholder="예: 56.3361" required />
          </div>

          <button type="submit">선박 추가 / 저장</button>
          <button type="button" class="btn-secondary" id="resetBtn">입력 초기화</button>
          <button type="button" class="btn-secondary" id="positionUpdateBtn">위치 업데이트</button>
        </form>
      </div>

      <div class="card">
        <h2>등록된 선박</h2>
        <div id="vesselList" class="vessel-list"></div>
      </div>
    </aside>

    <main class="map-wrap" id="mapWrap">
      <div class="map-toolbar">
        <div class="search-box">
          <input type="text" id="shipSearchInput" placeholder="선박검색" autocomplete="off" />
          <div id="shipSearchDropdown" class="search-dropdown"></div>
        </div>


        <button type="button" id="toggleAllLabelsBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">전체 보기</span>
          <span class="toolbar-chip-value" id="allViewStateText">OFF</span>
        </button>


        <button type="button" id="filterAllBtn" class="toolbar-chip toolbar-chip-btn active">
          <span class="toolbar-chip-label">전체</span>
          <span class="toolbar-chip-value" id="countAll">0척</span>
        </button>

        <button type="button" id="filterAgBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">AG 내</span>
          <span class="toolbar-chip-value" id="countAg">0척</span>
        </button>

        <button type="button" id="filterBothAreaBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">얀부, 푸자이라</span>
          <span class="toolbar-chip-value" id="countBothArea">0척</span>
        </button>

        <button type="button" id="filterOtherBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">그외 지역</span>
          <span class="toolbar-chip-value" id="countOther">0척</span>
        </button>

        <button type="button" id="filterUnder15Btn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">선령 15년 미만</span>
          <span class="toolbar-chip-value" id="countUnder15">0척</span>
        </button>


<button type="button" id="filterDryDock6mBtn" class="toolbar-chip-btn">
  <span class="toolbar-chip-label">6개월내 입거수리</span>
  <span class="toolbar-chip-value" id="countDryDock6m">0척</span>
</button>



        <button type="button" id="filterCrewConfirmedBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">선원교대 확정</span>
          <span class="toolbar-chip-value" id="countCrewConfirmed">0척</span>
        </button>

        <button type="button" id="filterCrewPendingBtn" class="toolbar-chip toolbar-chip-btn">
          <span class="toolbar-chip-label">선원교대 미정</span>
          <span class="toolbar-chip-value" id="countCrewPending">0척</span>
        </button>
      </div>

      <div id="map"></div>
      <div id="labelLayer" class="label-layer"></div>
    </main>
  </div>

  <input type="file" id="consentFileInput" accept=".pdf,.jpg,.jpeg,.png,.webp" hidden />
  <input type="file" id="positionExcelInput" accept=".xlsx" hidden />

  <div id="positionResultModal" class="position-result-modal" hidden>
    <div class="position-result-backdrop"></div>
    <div class="position-result-box">
      <div class="position-result-header">
        <h3>위치 업데이트 결과</h3>
        <button type="button" id="closePositionResultBtn" class="position-result-close">확인</button>
      </div>

      <div id="positionResultSummary" class="position-result-summary"></div>

      <div class="position-result-title">업데이트 실패 선박 List</div>
      <div id="positionResultFailedList" class="position-result-list"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='js/app.js', v=version) }}"></script>
</body>
</html>
